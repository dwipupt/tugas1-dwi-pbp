<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pendidikan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 40px 20px; 
        }
        .content-box { 
            background: white; width: 100%; max-width: 500px; 
            padding: 30px; border-radius: 25px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        h2 { color: #ff69b4; text-align: center; margin-bottom: 20px; }
        
        ol { 
            font-size: 16px; 
            line-height: 1.8; 
            color: #333; 
            padding-left: 20px; /* Jarak untuk number */
            font-weight: 500;
        }
        ol li { 
            margin-bottom: 12px; 
            padding-left: 10px;
        }

        .back-btn {
            display: inline-block; padding: 10px 20px; 
            background: #ff69b4; color: white; border-radius: 20px; 
            text-decoration: none; font-weight: bold; margin-top: 20px;
            transition: 0.3s background;
        }
        .back-btn:hover { background: #d63384; }
    </style>
</head>
<body>
    <div class="content-box">
        <h2>🎓 Riwayat Pendidikan</h2>
        <!-- Ordered List menggunakan variasi tipe numerik romawi besar -->
        <ol type="I">
            <li>Tk. Kuntala Dewi I (2011 - 2012)</li>
            <li>SD No 2 Abiansemal Dauh Yeh Cani (2012 - 2018)</li>
            <li>SMP Negeri 1 Abiansemal (2018 - 2021)</li>
            <li>SMA Negeri 1 Abiansemal (2021 - 2024)</li>
            <li>Universitas Hindu Negeri I Gusti Bagus Sugriwa Denpasar (2024 - sekarang)</li>
        </ol>
        <div style="text-align: center;">
            <a href="index.html" class="back-btn">Kembali ke Beranda</a>
        </div>
    </div>
</body>
</html>
